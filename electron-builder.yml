appId: com.example.devbrain
productName: DevBrain
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - package.json
extraResources:
  - from: .env
    to: .env
  - from: ./src/main/db/migrations
    to: migrations
mac:
  target: dmg
  category: public.app-category.utilities
win:
  target: nsis
linux:
  target: AppImage
